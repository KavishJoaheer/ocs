name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-tests:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        working-directory: server
        run: npm ci
      - name: Run API integration tests
        working-directory: server
        run: npm test

  client-build:
    name: Staff portal lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        working-directory: client
        run: npm ci
      - name: Lint
        working-directory: client
        run: npm run lint --if-present
      - name: Build
        working-directory: client
        run: npm run build

  patient-portal-build:
    name: Patient portal lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: patient-portal/package-lock.json
      - name: Install dependencies
        working-directory: patient-portal
        run: npm ci
      - name: Lint
        working-directory: patient-portal
        run: npm run lint --if-present
      - name: Build
        working-directory: patient-portal
        run: npm run build
